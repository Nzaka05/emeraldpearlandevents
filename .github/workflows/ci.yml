name: CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  NODE_ENV: test
  LOG_LEVEL: silent

jobs:
  lint-and-audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint server/ --ext .js
        continue-on-error: true

      - name: NPM Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-do-not-use-in-production
      STAFF_JWT_SECRET: test-staff-secret
      CLIENT_JWT_SECRET: test-client-secret
      MONGODB_URI: mongodb://localhost:27017/emerald-test
      REDIS_URL: redis://localhost:6379
    
    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Mask test secrets
        run: |
          echo "::add-mask::$JWT_SECRET"
          echo "::add-mask::$STAFF_JWT_SECRET"
          echo "::add-mask::$CLIENT_JWT_SECRET"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3.1.6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Test report
        if: always()
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            cat coverage/coverage-summary.json
          fi

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test, secret-scan]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint-and-audit.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Critical checks failed"
            exit 1
          else
            echo "✅ All checks passed"
            exit 0
          fi

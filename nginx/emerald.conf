# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name emeraldpearlandevents.com portal.emeraldpearlandevents.com;
    return 301 https://$server_name$request_uri;
}

# Admin Portal
server {
    listen 443 ssl http2;
    server_name admin.emeraldpearlandevents.com;

    ssl_certificate /etc/letsencrypt/live/emeraldpearlandevents.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emeraldpearlandevents.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}


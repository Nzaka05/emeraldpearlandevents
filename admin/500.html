<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #EAE6DF 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            padding: 48px;
            max-width: 500px;
        }

        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 120px;
            font-weight: 700;
            color: var(--accent-danger);
            letter-spacing: 4px;
            margin-bottom: 16px;
            animation: shake 0.5s ease infinite;
        }

        .error-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .error-text {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .error-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-home {
            padding: 12px 24px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--accent-gold);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .btn-back {
            padding: 12px 24px;
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 24px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    
        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */
        
        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }
            
            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }
            
            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .page-title {
                font-size: 22px;
            }
            
            .search-bar {
                display: none; /* Hide search on extreme mobile to save space */
            }
            
            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }
            
            /* Form Rows */
            .form-row, .booking-grid {
                grid-template-columns: 1fr;
            }
            
            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }

    </style>

    <!-- DARK MODE LOGIC -->
    <script>
        (function() {
            if (localStorage.getItem('emeraldDarkMode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        :root {
            --bg-primary: #F7F4EF;
            --bg-card: #FFFFFF;
            --text-main: #0D2B1F;
            --border-color: #E9E5DB;
            --accent-gold: #C9A84C;
            --accent-gold-hover: #E9A825;
            --accent-danger: #B5332A;
            --sidebar-bg: #FFFFFF;
        }

        html.dark-mode {
            --bg-primary: #0a1f16;
            --bg-card: #0d2b1f;
            --text-main: #F7F4EF;
            --border-color: #1a3d2e;
            --sidebar-bg: #091a13;
        }

        /* Generic Dark Mode Fixes */
        html.dark-mode .sidebar { background: var(--sidebar-bg); border-right-color: var(--border-color); }
        html.dark-mode .topbar { background: var(--sidebar-bg); border-bottom-color: var(--border-color); }
        html.dark-mode .modal-content { background: var(--bg-card); }
        html.dark-mode input, html.dark-mode select, html.dark-mode textarea { background: var(--sidebar-bg); color: var(--text-main); }
        html.dark-mode .btn-secondary, html.dark-mode .btn-cancel { color: var(--text-main); }
        html.dark-mode .nav-item { color: var(--text-main); }
        html.dark-mode .pagination-btn { background: var(--sidebar-bg); color: var(--text-main); }
    </style>

</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-text">
            Something went wrong on our end. Our team has been notified and is working to resolve the issue. 
            Please try again later.
        </p>
        <div class="error-buttons">
            <a href="/admin/dashboard" class="btn-home">← Back to Dashboard</a>
            <a href="javascript:location.reload()" class="btn-back">Retry</a>
        </div>
    </div>
</body>
</html>

        * {

        body {

            color: var(--text-main);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            border-right: 1px solid var(--accent-gold-hover);
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sidebar-logo {
            padding: 0 24px;
            margin-bottom: 48px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            animation: floatIdle 6s ease-in-out infinite;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            margin: 0 12px;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(201, 168, 76, 0.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gold);
        }

        .sidebar-footer {
            padding: 20px 24px;
            margin-top: auto;
            flex-shrink: 0;
            border-top: 1px solid rgba(201, 168, 76, 0.2);
        }

        .logout-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .search-bar {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 300px;
            font-size: 13px;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.1);
        }

        .btn-primary {
            padding: 10px 20px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 320px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .flip-card-front {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-primary) 100%);
        }

        .flip-card-back {
            background: linear-gradient(135deg, var(--text-main) 0%, #1a3d2e 100%);
            color: var(--bg-primary);
            transform: rotateY(180deg);
        }

        .client-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-card);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.2);
        }

        .client-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .client-event-type {
            font-size: 12px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .client-email {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            word-break: break-all;
        }

        .client-phone {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .client-info-row {
            font-size: 11px;
            color: var(--accent-gold-hover);
            margin-top: 6px;
        }

        .flip-card-back .info-item {
            text-align: left;
            width: 100%;
            font-size: 11px;
            margin-top: 8px;
            line-height: 1.6;
        }

        .info-label {
            color: var(--accent-gold);
            font-weight: 600;
        }

        @keyframes floatIdle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }



        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */

        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {

            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }

            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }

            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }

            .page-title {
                font-size: 22px;
            }

            .search-bar {
                display: none;
                /* Hide search on extreme mobile to save space */
            }

            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }

            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }

            /* Form Rows */
            .form-row,
            .booking-grid {
                grid-template-columns: 1fr;
            }

            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }

    <script>
        function toggleFab() {
            document.getElementById('mobileFab').classList.toggle('active');
        }

        // Close FAB if clicking outside
        document.addEventListener('click', (e) => {
            const fab = document.getElementById('mobileFab');
            if (fab && fab.classList.contains('active') && !fab.contains(e.target)) {
                fab.classList.remove('active');
            }
        });
    </script>

                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="clientPhone" class="form-input" placeholder="+254...">
                </div>
                <div class="form-group">
                    <label class="form-label">Location (Optional)</label>
                    <input type="text" id="clientLocation" class="form-input" placeholder="Nairobi">
                </div>
                <div class="form-group">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea id="clientNotes" class="form-textarea"
                        placeholder="Internal notes about the client..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeClientModal()"
                    style="border: 1px solid var(--border-color); background: transparent; padding: 10px 20px; border-radius: 4px; cursor: pointer; color: var(--text-main);">Cancel</button>
                <button class="btn-primary" onclick="saveClient()">Save Client</button>
            </div>
        </div>
    </div>

    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 43, 31, 0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            background: transparent;
            color: var(--text-main);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* VIP Badge Styles */
        .vip-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #c9a84c, #e8c96d);
            color: #1a3c2e;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            vertical-align: middle;
            margin-left: 6px;
        }

        .vip-filter-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .vip-filter-btn.active {
            background: linear-gradient(135deg, #c9a84c, #e8c96d);
            color: #1a3c2e;
            border-color: #c9a84c;
        }

        .vip-filter-btn:hover {
            border-color: #c9a84c;
        }

        .vip-filter-btn.active:hover {
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let allClients = [];

        window.addEventListener('load', () => {
            updateDate();
            loadClients();
        });

        function updateDate() {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('todayDate').textContent = today;
        }

        async function loadClients() {
            try {
                // Fetch both bookings and standalone CRM customers
                const [bookingsRes, customersRes] = await Promise.all([
                    fetch('/api/admin/bookings?limit=100'),
                    fetch('/api/admin/customers')
                ]);

                const bookingsData = await bookingsRes.json();
                const customersData = await customersRes.json();

                const clientMap = new Map();

                // 1. Load standalone customers first
                if (customersData.success) {
                    customersData.customers.forEach(cust => {
                        if (!cust) return;
                        clientMap.set((cust.email || '').toLowerCase(), {
                            isStandalone: true,
                            id: cust._id,
                            name: cust.name,
                            email: cust.email,
                            phone: cust.phone,
                            eventType: 'General Client',
                            location: cust.location || '',
                            totalBookings: 0,
                            isVIP: cust.isVIP || false,
                            status: cust.status || 'active'
                        });
                    });
                }

                // 2. Merge bookings data (update counts or add missing)
                if (bookingsData.success) {
                    bookingsData.bookings.forEach(booking => {
                        if (!booking) return;
                        const emailKey = (booking.customerEmail || '').toLowerCase();
                        if (!clientMap.has(emailKey)) {
                            clientMap.set(emailKey, {
                                isStandalone: false,
                                name: booking.customerName,
                                email: booking.customerEmail,
                                phone: booking.customerPhone,
                                eventType: booking.eventType,
                                location: booking.customerLocation,
                                totalBookings: 1
                            });
                        } else {
                            const client = clientMap.get(emailKey);
                            client.totalBookings++;
                            // update event type if it's currently general
                            if (client.eventType === 'General Client') {
                                client.eventType = booking.eventType;
                            }
                        }
                    });
                }

                allClients = Array.from(clientMap.values());
                renderClients(allClients);
            } catch (error) {
                console.error('Error loading clients:', error);
            }
        }

        let showingVIPOnly = false;

        function renderClients(clients) {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = clients.map((client, index) => {
                const initials = (client.name || '?').split(' ').map(n => n[0]).join('').toUpperCase();
                const vipBadge = client.isVIP 
                    ? `<span class="vip-badge"><i class="fas fa-star"></i> VIP</span>` 
                    : '';
                return `
                    <div class="flip-card" data-vip="${client.isVIP || false}" data-client-id="${client.id || ''}" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="client-avatar">${initials}</div>
                                <div class="client-name">${client.name}${vipBadge}</div>
                                <div class="client-event-type">${client.eventType}</div>
                                <div class="client-email">${client.email}</div>
                                <div class="client-phone">${client.phone}</div>
                                <div class="client-info-row"><i class="fas fa-book"></i> ${client.totalBookings} booking${client.totalBookings > 1 ? 's' : ''}</div>
                            </div>
                            <div class="flip-card-back">
                                <div style="width: 100%;">
                                    <div style="font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; margin-bottom: 12px;">Client Details</div>
                                    <div class="info-item"><span class="info-label">Location:</span><br>${client.location || 'Not specified'}</div>
                                    <div class="info-item"><span class="info-label">Total Bookings:</span><br>${client.totalBookings}</div>
                                    <div class="info-item"><span class="info-label">Primary Event:</span><br>${client.eventType}</div>
                                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(201, 168, 76, 0.3);">
                                        <button onclick="event.stopPropagation(); editClient('${client.id}')" style="background: var(--accent-gold); color: var(--text-main); border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 8px;">Edit</button>
                                        <button onclick="event.stopPropagation(); deleteClient('${client.email}')" style="background: var(--accent-danger); color: var(--bg-primary); border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; width: 100%;">Delete</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleVIPFilter() {
            showingVIPOnly = !showingVIPOnly;
            const btn = document.getElementById('vipFilterBtn');
            btn.classList.toggle('active', showingVIPOnly);
            
            document.querySelectorAll('.flip-card').forEach(card => {
                if (showingVIPOnly) {
                    card.style.display = card.dataset.vip === 'true' ? 'block' : 'none';
                } else {
                    card.style.display = 'block';
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = (e.target.value || '').toLowerCase();
            const filtered = allClients.filter(client =>
                (client.name || '').toLowerCase().includes(term) ||
                (client.email || '').toLowerCase().includes(term)
            );
            renderClients(filtered);
        });

        function openNewClientModal() {
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientLocation').value = '';
            document.getElementById('clientNotes').value = '';
            document.getElementById('clientModal').classList.add('show');
        }

        function closeClientModal() {
            document.getElementById('clientModal').classList.remove('show');
        }

        async function saveClient() {
            const name = document.getElementById('clientName').value.trim();
            const email = document.getElementById('clientEmail').value.trim();
            const phone = document.getElementById('clientPhone').value.trim();
            const location = document.getElementById('clientLocation').value.trim();
            const notes = document.getElementById('clientNotes').value.trim();

            if (!name || !email || !phone) {
                alert('Please fill in name, email, and phone.');
                return;
            }

            try {
                const response = await fetch('/api/admin/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, location, notes })
                });

                const result = await response.json();
                if (result.success) {
                    closeClientModal();
                    alert('Client added successfully!');
                    loadClients();
                } else {
                    alert('Error creating client: ' + result.message);
                }
            } catch (error) {
                console.error('Save error:', error);
                alert('Failed to save client.');
            }
        }

        function editClient(clientId) {
            if (!clientId) {
                alert('Cannot edit: Client ID not found');
                return;
            }
            window.location.href = `/admin/clients/${clientId}/edit`;
        }

        async function deleteClient(email) {
            if (confirm(`Delete client \${email}? Note: This only deletes standalone CRM records, not booking emails.`)) {
                const client = allClients.find(c => c.email === email);
                if (client && client.isStandalone && client.id) {
                    try {
                        await fetch(`/api/admin/customers/\${client.id}`, { method: 'DELETE' });
                    } catch (e) { console.error('Delete failed:', e); }
                }
                allClients = allClients.filter(c => c.email !== email);
                renderClients(allClients);
            }
        }

        function handleLogout() {
            fetch('/api/admin/logout', { method: 'POST' })
                .then(() => window.location.href = '/admin/login')
                .catch(error => console.error('Logout error:', error));
        }

    </script>
        <script src="/admin/assets/mobile-sidebar.js?v=3"></script>
    <script src="/admin/admin-profile.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Emerald Pearland Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: #1a1a1a;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .mobile-bg-video {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(247, 244, 239, 0.85);
            /* Light mode overlay */
            z-index: 1;
            display: none;
            pointer-events: none;
        }

        /* LEFT SIDE - VIDEO BACKGROUND */
        .login-left {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--bg-primary);
            padding: 40px;
        }

        .login-left video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 43, 31, 0.4);
            z-index: 1;
        }



        .login-left-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 40px;
            animation: floatIdle 6s ease-in-out infinite;
        }

        @keyframes floatIdle {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .login-left h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        .login-left p {
            font-size: 16px;
            opacity: 0.9;
            font-style: italic;
            color: var(--accent-gold);
            margin-bottom: 40px;
        }

        /* FLOATING PARTICLES */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 0.3;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* RIGHT SIDE - LOGIN FORM */
        .login-right {
            flex: 1;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-form-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-form-header {
            text-align: center;
            margin-bottom: 45px;
        }

        .login-form-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }

        .login-form-header p {
            font-size: 14px;
            color: #6b6b6b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #6b6b6b;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d4af37;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            background: white;
            color: #1a1a1a;
            transition: all 0.3s ease;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }

        .toggle-password:hover {
            opacity: 0.8;
        }

        .form-group input::placeholder {
            color: #b0b0b0;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }

        .form-group input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px white inset !important;
            -webkit-text-fill-color: #1a1a1a !important;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--text-main) 0%, #2d8a5e 100%);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13, 43, 31, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--accent-danger);
            font-size: 13px;
            margin-top: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .success-state {
            display: none;
            text-align: center;
            padding: 40px;
            background: #f0f8f4;
            border-radius: 8px;
            border-left: 4px solid #2d6a4f;
        }

        .success-state.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .login-left {
                display: none;
            }

            .mobile-bg-video {
                display: block;
            }

            .login-container::before {
                display: block;
            }

            .login-right {
                flex: 1;
                background: transparent;
                position: relative;
                z-index: 2;
            }
        }

        @media (max-width: 600px) {
            .login-form-wrapper {
                max-width: 280px;
            }

            .login-form-header h2 {
                font-size: 24px;
            }

            .submit-btn,
            .form-group input {
                padding: 12px;
                font-size: 14px;
            }
        }

        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */

        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {

            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }

            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }

            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }

            .page-title {
                font-size: 22px;
            }

            .search-bar {
                display: none;
                /* Hide search on extreme mobile to save space */
            }

            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }

            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }

            /* Form Rows */
            .form-row,
            .booking-grid {
                grid-template-columns: 1fr;
            }

            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }
    </style>

    <!-- DARK MODE LOGIC -->
    <script>
        (function () {
            if (localStorage.getItem('emeraldDarkMode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        :root {
            --bg-primary: #F7F4EF;
            --bg-card: #FFFFFF;
            --text-main: #0D2B1F;
            --border-color: #E9E5DB;
            --accent-gold: #C9A84C;
            --accent-gold-hover: #E9A825;
            --accent-danger: #B5332A;
            --sidebar-bg: #FFFFFF;
        }

        html.dark-mode {
            --bg-primary: #0a1f16;
            --bg-card: #0d2b1f;
            --text-main: #F7F4EF;
            --border-color: #1a3d2e;
            --sidebar-bg: #091a13;
        }

        /* Generic Dark Mode Fixes */
        html.dark-mode .sidebar {
            background: var(--sidebar-bg);
            border-right-color: var(--border-color);
        }

        html.dark-mode .topbar {
            background: var(--sidebar-bg);
            border-bottom-color: var(--border-color);
        }

        html.dark-mode .modal-content {
            background: var(--bg-card);
        }

        html.dark-mode input,
        html.dark-mode select,
        html.dark-mode textarea {
            background: var(--sidebar-bg);
            color: var(--text-main);
        }

        html.dark-mode .btn-secondary,
        html.dark-mode .btn-cancel {
            color: var(--text-main);
        }

        html.dark-mode .nav-item {
            color: var(--text-main);
        }

        html.dark-mode .pagination-btn {
            background: var(--sidebar-bg);
            color: var(--text-main);
        }

        html.dark-mode .login-container::before {
            background: rgba(10, 31, 22, 0.90);
            /* Dark mode overlay */
        }
    </style>
    <link rel="stylesheet" href="/admin/assets/premium-admin.css">
</head>

<body>
    <div class="login-container">
        <!-- MOBILE BACKGROUND VIDEO -->
        <video autoplay muted loop playsinline class="mobile-bg-video">
            <source src="/images/logo.mp4" type="video/mp4">
        </video>

        <!-- LEFT SIDE -->
        <div class="login-left">
            <video autoplay muted loop playsinline>
                <source src="/images/logo.mp4" type="video/mp4">
            </video>
            <div class="particles" id="particlesContainer"></div>
            <div class="login-left-content">
                <div class="logo-container">
                    <div class="logo">
                        <img src="/images/logo 2.png" alt="Emerald Pearland Events">
                    </div>
                </div>
                <h1>EMERALD<br>PEARLAND</h1>
                <p>Admin Portal</p>
            </div>
        </div>
        <!-- RIGHT SIDE -->
        <div class="login-right">
            <div class="login-form-wrapper">
                <div class="login-form-header">
                    <h2>Welcome</h2>
                    <p>Admin Console</p>
                </div>

                <form id="loginForm" style="display: none;">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="admin@emeraldpearland.com" required>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()"
                                id="toggleBtn">
                                👁️
                            </button>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span id="btnText">Sign In</span>
                    </button>

                    <div class="error-message" id="generalError"></div>
                </form>

                <div class="success-state" id="successState">
                    <div style="font-size: 40px; margin-bottom: 15px;">✓</div>
                    <h3
                        style="font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #2d6a4f; margin-bottom: 10px;">
                        Welcome Back</h3>
                    <p style="color: #6b6b6b; margin-bottom: 20px;">Directing to your dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.getElementById('toggleBtn');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '👁️‍🗨️';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // Generate floating particles
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = -10 + 'px';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Show form after page load
        window.addEventListener('load', () => {
            createParticles();
            const form = document.getElementById('loginForm');
            gsap.fromTo(form,
                { opacity: 0, y: 20 },
                { opacity: 1, y: 0, duration: 0.8, delay: 0.3 }
            );
            form.style.display = 'block';
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            // Clear previous errors
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('generalError').textContent = '';

            // Validate
            if (!email || !password) {
                document.getElementById('generalError').textContent = 'Email and password are required';
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>Signing In...';

            try {
                console.log('🔐 Login attempt for:', email);

                // when the page is served by the node server this will resolve
                // to http://localhost:3000/api/admin/login; if you're opening the
                // file directly this won't work – make sure to use the server URL
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log('📡 Response status:', response.status);

                // Always try to parse as JSON
                const data = await response.json();
                console.log('📄 Response data:', data);

                // Check if successful
                if (data.success) {
                    console.log('✅ Login successful!');

                    // Show success state
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('successState').classList.add('show');

                    // Redirect after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Login failed');
                }

            } catch (error) {
                console.error('❌ Login error:', error);
                let errorMsg = error.message || 'Login failed';

                // Specific error messages
                if (errorMsg.includes('JSON')) {
                    errorMsg = '❌ Invalid email or password';
                } else {
                    errorMsg = '❌ ' + errorMsg;
                }

                document.getElementById('generalError').textContent = errorMsg;
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';

                // Shake animation
                gsap.to('#loginForm', {
                    x: -10,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 5
                });
            }
        });
    </script>

    <script>
        // ═══ Mobile Sidebar Toggle ═══
        (function() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.querySelector('.sidebar');
            if (!menuBtn || !sidebar) return;
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                sidebar.classList.toggle('active');
            });
            // Close sidebar if clicking outside it
            document.addEventListener('click', function(e) {
                if (sidebar.classList.contains('active') && 
                    !sidebar.contains(e.target) && 
                    e.target !== menuBtn) {
                    sidebar.classList.remove('active');
                }
            });
        })();
    </script>
        <script src="/js/mobile-sidebar.js"></script>
</body>

</html>

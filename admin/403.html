<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unauthorized Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--text-main) 0%, #1a3d2e 100%);
            color: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            padding: 48px;
            max-width: 500px;
        }

        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 120px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 4px;
            margin-bottom: 16px;
        }

        .error-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--bg-primary);
            margin-bottom: 12px;
        }

        .error-text {
            font-size: 16px;
            color: rgba(247, 244, 239, 0.8);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .error-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-login {
            padding: 12px 24px;
            background: var(--accent-gold);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
        }

        .btn-home {
            padding: 12px 24px;
            background: transparent;
            color: var(--bg-primary);
            border: 2px solid var(--accent-gold);
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: rgba(201, 168, 76, 0.1);
            border-color: var(--accent-gold-hover);
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: lock 2s ease-in-out infinite;
        }

        @keyframes lock {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    
        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */
        
        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }
            
            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }
            
            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .page-title {
                font-size: 22px;
            }
            
            .search-bar {
                display: none; /* Hide search on extreme mobile to save space */
            }
            
            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }
            
            /* Form Rows */
            .form-row, .booking-grid {
                grid-template-columns: 1fr;
            }
            
            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }

    </style>

    <!-- DARK MODE LOGIC -->
    <script>
        (function() {
            if (localStorage.getItem('emeraldDarkMode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        :root {
            --bg-primary: #F7F4EF;
            --bg-card: #FFFFFF;
            --text-main: #0D2B1F;
            --border-color: #E9E5DB;
            --accent-gold: #C9A84C;
            --accent-gold-hover: #E9A825;
            --accent-danger: #B5332A;
            --sidebar-bg: #FFFFFF;
        }

        html.dark-mode {
            --bg-primary: #0a1f16;
            --bg-card: #0d2b1f;
            --text-main: #F7F4EF;
            --border-color: #1a3d2e;
            --sidebar-bg: #091a13;
        }

        /* Generic Dark Mode Fixes */
        html.dark-mode .sidebar { background: var(--sidebar-bg); border-right-color: var(--border-color); }
        html.dark-mode .topbar { background: var(--sidebar-bg); border-bottom-color: var(--border-color); }
        html.dark-mode .modal-content { background: var(--bg-card); }
        html.dark-mode input, html.dark-mode select, html.dark-mode textarea { background: var(--sidebar-bg); color: var(--text-main); }
        html.dark-mode .btn-secondary, html.dark-mode .btn-cancel { color: var(--text-main); }
        html.dark-mode .nav-item { color: var(--text-main); }
        html.dark-mode .pagination-btn { background: var(--sidebar-bg); color: var(--text-main); }
    </style>

    <link rel="stylesheet" href="/admin/assets/premium-admin.css">
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🔐</div>
        <div class="error-code">403</div>
        <h1 class="error-title">Unauthorized Access</h1>
        <p class="error-text">
            You don't have permission to access this resource. Please log in with the correct credentials 
            or contact your administrator if you believe this is incorrect.
        </p>
        <div class="error-buttons">
            <a href="/admin/login.html" class="btn-login">← Log In Again</a>
            <a href="/" class="btn-home">Go to Homepage</a>
        </div>
    </div>

    <script>
        // ═══ Mobile Sidebar Toggle ═══
        (function() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.querySelector('.sidebar');
            if (!menuBtn || !sidebar) return;
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                sidebar.classList.toggle('active');
            });
            // Close sidebar if clicking outside it
            document.addEventListener('click', function(e) {
                if (sidebar.classList.contains('active') && 
                    !sidebar.contains(e.target) && 
                    e.target !== menuBtn) {
                    sidebar.classList.remove('active');
                }
            });
        })();
    </script>
    <script src="/admin/assets/mobile-sidebar.js"></script>
</body>
</html>

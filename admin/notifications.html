<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Emerald Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            border-right: 1px solid var(--accent-gold-hover);
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sidebar-logo {
            padding: 0 24px;
            margin-bottom: 48px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            animation: floatIdle 6s ease-in-out infinite;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            margin: 0 12px;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(201, 168, 76, 0.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gold);
        }

        .sidebar-footer {
            padding: 20px 24px;
            margin-top: auto;
            flex-shrink: 0;
            border-top: 1px solid rgba(201, 168, 76, 0.2);
        }

        .logout-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab.active {
            color: var(--text-main);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gold);
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bulk-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }

        .bulk-actions.active {
            display: flex;
        }

        .notification-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-gold);
            padding: 16px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item:hover {
            box-shadow: 0 4px 12px rgba(13, 43, 31, 0.1);
        }

        .notification-item.unread {
            background: rgba(201, 168, 76, 0.05);
            border-left-color: var(--accent-gold-hover);
        }

        .notification-checkbox {
            margin-right: 16px;
            margin-top: 4px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--accent-gold);
        }

        .notification-content {
            flex: 1;
        }

        .notification-type {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-gold);
            margin-bottom: 4px;
        }

        .notification-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 8px;
            max-height: 42px;
            /* ~2 lines */
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .notification-item.expanded .notification-text {
            max-height: 500px;
        }

        .view-booking-link {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            margin-bottom: 8px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .view-booking-link:hover {
            text-decoration: underline;
        }

        .notification-item.expanded .view-booking-link {
            opacity: 1;
            max-height: 30px;
        }

        .notification-time {
            font-size: 11px;
            color: #999;
        }

        .notification-actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-mark {
            background: var(--text-main);
            color: var(--bg-primary);
        }

        .btn-mark:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .btn-delete {
            background: var(--accent-danger);
            color: var(--bg-primary);
        }

        .btn-delete:hover {
            background: #8B2620;
            color: var(--bg-primary);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
            color: #999;
        }

        @keyframes floatIdle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */

        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {

            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }

            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }

            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }

            .page-title {
                font-size: 22px;
            }

            .search-bar {
                display: none;
                /* Hide search on extreme mobile to save space */
            }

            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }

            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }

            /* Form Rows */
            .form-row,
            .booking-grid {
                grid-template-columns: 1fr;
            }

            /* Tables */
            .table-container {
                overflow-x: auto;
            }

            .notification-item {
                flex-direction: column;
            }

            .notification-actions {
                margin-left: 0;
                margin-top: 12px;
                width: 100%;
                justify-content: space-between;
            }
        }

            opacity: 1;

        .mobile-fab-container.active .mobile-fab-btn {
            transform: rotate(45deg);

        .fab-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;

    <script>
        function toggleFab() {
            document.getElementById('mobileFab').classList.toggle('active');

        // Close FAB if clicking outside
        document.addEventListener('click', (e) => {
            const fab = document.getElementById('mobileFab');
            if (fab && fab.classList.contains('active') && !fab.contains(e.target)) {
                fab.classList.remove('active');
            }
        });
    </script>

    <script>
        let sampleNotifications = [];
        let currentFilter = 'unread'; // Default to unread as requested
        let selectedNotificationIds = new Set();
        let isLoading = false;

        window.addEventListener('load', () => {
            updateDate();
            loadNotifications();
        });

        async function loadNotifications() {
            if (isLoading) return;
            isLoading = true;
            try {
                const response = await fetch('/api/admin/notifications');
                const result = await response.json();
                if (result.success) {
                    sampleNotifications = result.notifications.map(n => ({
                        id: n._id,
                        type: n.type,
                        text: n.message,
                        time: new Date(n.createdAt).toLocaleString(),
                        isRead: n.isRead,
                        icon: n.icon,
                        bookingId: n.bookingRef ? n.bookingRef._id : null
                    }));
                    renderNotifications();
                }
            } catch (error) {
                console.error('Error loading notifications:', error);
            } finally {
                isLoading = false;
            }
        }

        function updateDate() {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('todayDate').textContent = today;
        }

        function renderNotifications() {
            let filtered = sampleNotifications;

            if (currentFilter === 'unread') {
                filtered = sampleNotifications.filter(n => !n.isRead);
            } else if (currentFilter === 'read') {
                filtered = sampleNotifications.filter(n => n.isRead);
            }

            const list = document.getElementById('notificationsList');
            const bulkBar = document.getElementById('bulkActions');

            // Re-evaluate 'Select All' state
            const selectAllCheck = document.getElementById('selectAllCheckbox');
            if (selectAllCheck) { // Check if selectAllCheck exists before accessing its properties
                if (filtered.length > 0 && Array.from(filtered).every(n => selectedNotificationIds.has(n.id))) {
                    selectAllCheck.checked = true;
                } else {
                    selectAllCheck.checked = false;
                }
            }


            if (filtered.length === 0) {
                bulkBar.classList.remove('active');
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">No notifications found</div>
                    </div>
                `;
                return;
            }

            bulkBar.classList.add('active');

            list.innerHTML = filtered.map(notif => `
                <div class="notification-item ${notif.isRead ? '' : 'unread'}" id="notif-${notif.id}" onclick="handleNotificationClick(event, '${notif.id}', ${!notif.isRead})">
                    <input type="checkbox" class="notification-checkbox" value="${notif.id}" 
                        ${selectedNotificationIds.has(notif.id) ? 'checked' : ''} 
                        onclick="event.stopPropagation(); toggleCheckbox('${notif.id}')">
                    <div class="notification-content">
                        <div class="notification-type">${notif.type.replace(/_/g, ' ')}</div>
                        <div class="notification-text">${notif.text}</div>
                        ${notif.bookingId ? `<a href="/admin/bookings?highlight=${notif.bookingId}" class="view-booking-link" onclick="event.stopPropagation()">View Booking →</a>` : ''}
                        <div class="notification-time">${notif.time}</div>
                    </div>
                    <div class="notification-actions">
                        <button class="action-btn btn-mark" onclick="event.stopPropagation(); toggleRead('${notif.id}')">${notif.isRead ? 'Mark Unread' : 'Mark Read'}</button>
                        <button class="action-btn btn-delete" onclick="event.stopPropagation(); deleteNotification('${notif.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function handleNotificationClick(event, id, isItemUnread) {
            // Expand item
            const item = document.getElementById(`notif-${id}`);
            if (item) {
                item.classList.toggle('expanded');
            }

            // If it is unread, automatically mark it as read
            if (isItemUnread) {
                toggleRead(id, true);
            }
        }

        function toggleCheckbox(id) {
            if (selectedNotificationIds.has(id)) {
                selectedNotificationIds.delete(id);
            } else {
                selectedNotificationIds.add(id);
            }
            renderNotifications();
        }

        function toggleSelectAll(checkbox) {
            let filtered = sampleNotifications;
            if (currentFilter === 'unread') filtered = sampleNotifications.filter(n => !n.isRead);
            else if (currentFilter === 'read') filtered = sampleNotifications.filter(n => n.isRead);

            if (checkbox.checked) {
                filtered.forEach(n => {
                    if (!n) return;
                    selectedNotificationIds.add(n.id);
                });
            } else {
                filtered.forEach(n => {
                    if (!n) return;
                    selectedNotificationIds.delete(n.id);
                });
            }
            renderNotifications();
        }

        function filterNotifications(filter) {
            currentFilter = filter;
            selectedNotificationIds.clear();
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderNotifications();
        }

        async function toggleRead(id, forceRead = false) {
            try {
                const notification = sampleNotifications.find(n => n.id === id);
                if (forceRead && notification && notification.isRead) return;

                const response = await fetch(`/api/admin/notifications/${id}/read`, { method: 'PATCH' });
                const result = await response.json();
                if (result.success) {
                    if (notification) {
                        notification.isRead = !notification.isRead;
                    }
                    renderNotifications();
                }
            } catch (error) {
                console.error('Error toggling read status:', error);
            }
        }

        async function bulkMarkRead() {
            if (selectedNotificationIds.size === 0) return alert('No notifications selected');

            const promises = Array.from(selectedNotificationIds).map(id =>
                fetch(`/api/admin/notifications/${id}/read`, { method: 'PATCH' })
            );

            await Promise.all(promises);
            selectedNotificationIds.clear();
            await loadNotifications();
        }

        async function bulkDelete() {
            if (selectedNotificationIds.size === 0) return alert('No notifications selected');
            if (!confirm(`Are you sure you want to delete ${selectedNotificationIds.size} notifications?`)) return;

            const promises = Array.from(selectedNotificationIds).map(id =>
                fetch(`/api/admin/notifications/${id}`, { method: 'DELETE' })
            );

            await Promise.all(promises);
            selectedNotificationIds.clear();
            await loadNotifications();
        }

        function handleLogout() {
            fetch('/api/admin/logout', { method: 'POST' })
                .then(() => window.location.href = '/admin/login')
                .catch(error => console.error('Logout error:', error));
        }
    </script>
            <script src="/js/mobile-sidebar.js?v=3"></script>
    <script src="/admin/admin-profile.js"></script>
</body>

</html>

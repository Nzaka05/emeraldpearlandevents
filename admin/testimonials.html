    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            border-right: 1px solid var(--accent-gold-hover);
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sidebar-logo {
            padding: 0 24px;
            margin-bottom: 48px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            animation: floatIdle 6s ease-in-out infinite;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            margin: 0 12px;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(201, 168, 76, 0.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gold);
        }

        .sidebar-footer {
            padding: 20px 24px;
            margin-top: auto;
            flex-shrink: 0;
            border-top: 1px solid rgba(201, 168, 76, 0.2);
        }

        .logout-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab.active {
            color: var(--text-main);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gold);
        }

        .testimonials-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .testimonial-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            box-shadow: 0 8px 24px rgba(13, 43, 31, 0.1);
        }

        .testimonial-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .testimonial-author {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .testimonial-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-card);
            font-weight: 700;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .author-role {
            font-size: 12px;
            color: #999;
        }

        .rating {
            display: flex;
            gap: 4px;
        }

        .star {
            color: var(--accent-gold);
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-pending {
            background: rgba(233, 168, 37, 0.1);
            color: var(--accent-gold-hover);
        }

        .status-approved {
            background: rgba(45, 106, 79, 0.1);
            color: #2D6A4F;
        }

        .status-hidden {
            background: rgba(181, 51, 42, 0.1);
            color: var(--accent-danger);
        }

        .testimonial-text {
            font-size: 14px;
            color: var(--text-main);
            font-style: italic;
            margin: 12px 0;
            line-height: 1.6;
        }

        .testimonial-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .testimonial-actions {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #2D6A4F;
            color: var(--bg-primary);
        }

        .btn-approve:hover {
            background: #1a4d35;
        }

        .btn-hide {
            background: var(--accent-danger);
            color: var(--bg-primary);
        }

        .btn-hide:hover {
            background: #8B2620;
        }

        .btn-delete {
            background: #666;
            color: var(--bg-primary);
        }

        .btn-delete:hover {
            background: #444;
        }

        @keyframes floatIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    
        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */
        
        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }
            
            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }
            
            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .page-title {
                font-size: 22px;
            }
            
            .search-bar {
                display: none; /* Hide search on extreme mobile to save space */
            }
            
            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }
            
            /* Form Rows */
            .form-row, .booking-grid {
                grid-template-columns: 1fr;
            }
            
            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }

    <script>
    let testimonials = [];
    let currentFilter = 'all';
    window.addEventListener('load', () => { updateDate(); loadTestimonials(); });
    function updateDate() {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', options);
    }
    async function loadTestimonials() {
        try {
            const res = await fetch('/api/admin/testimonials');
            const data = await res.json();
            if (data.success) { testimonials = data.testimonials; renderTestimonials(); }
        } catch (err) { console.error(err); }
    }
    function renderTestimonials() {
        const grid = document.getElementById('testimonialsList');
        if (!grid) return;
        const filtered = currentFilter === 'all' ? testimonials : testimonials.filter(t => t.status === currentFilter);
        if (filtered.length === 0) {
            grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888">No testimonials found.</p>';
            return;
        }
        grid.innerHTML = filtered.map(t => {
            const stars = Array(t.rating || 5).fill('&#9733;').join('');
            return '<div style="background:#1a2235;border:1px solid #2d3a55;border-radius:12px;padding:20px;margin-bottom:16px;">' +
                '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">' +
                '<div><div style="font-weight:600;color:#f0f4ff;">' + t.name + '</div>' +
                '<div style="font-size:12px;color:#8b99b8;">' + (t.role || 'Client') + (t.eventType ? ' - ' + t.eventType : '') + '</div>' +
                '<div style="color:#c9a84c;">' + stars + '</div></div>' +
                '<span class="status-badge status-' + t.status + '">' + t.status + '</span></div>' +
                '<p style="color:#8b99b8;font-size:14px;line-height:1.6;margin-bottom:16px;">"' + t.text + '"</p>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
                '<button onclick="approveTestimonial('' + t._id + '')" style="padding:6px 12px;background:' + (t.status==='approved'?'#2d6a4f':'#1a3a2a') + ';color:#34d399;border:1px solid #34d399;border-radius:6px;cursor:pointer;font-size:12px;">' + (t.status==='approved'?'Approved':'Approve') + '</button>' +
                '<button onclick="toggleDisplay('' + t._id + '',' + t.displayOnWebsite + ')" style="padding:6px 12px;background:' + (t.displayOnWebsite?'#2d4a6a':'#1a2a3a') + ';color:' + (t.displayOnWebsite?'#60a5fa':'#8b99b8') + ';border:1px solid ' + (t.displayOnWebsite?'#60a5fa':'#2d3a55') + ';border-radius:6px;cursor:pointer;font-size:12px;">' + (t.displayOnWebsite?'Showing on Site':'Show on Site') + '</button>' +
                '<button onclick="deleteTestimonial('' + t._id + '')" style="padding:6px 12px;background:#3a1a1a;color:#e74c3c;border:1px solid #e74c3c;border-radius:6px;cursor:pointer;font-size:12px;">Delete</button>' +
                '</div></div>';
        }).join('');
    }
    function filterTestimonials(status) { currentFilter = status; renderTestimonials(); }
    async function approveTestimonial(id) {
        await fetch('/api/admin/testimonials/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: 'approved' }) });
        loadTestimonials();
    }
    async function toggleDisplay(id, current) {
        await fetch('/api/admin/testimonials/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ displayOnWebsite: !current, status: 'approved' }) });
        loadTestimonials();
    }
    async function deleteTestimonial(id) {
        if (!confirm('Delete this testimonial?')) return;
        await fetch('/api/admin/testimonials/' + id, { method: 'DELETE' });
        loadTestimonials();
    }
    async function saveTestimonial() {
        const data = { name: document.getElementById('clientName').value, role: document.getElementById('clientRole').value, text: document.getElementById('testimonialText').value, rating: parseInt(document.getElementById('testimonialRating').value) || 5, eventType: document.getElementById('eventType').value, status: 'approved', displayOnWebsite: true };
        await fetch('/api/admin/testimonials', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        loadTestimonials();
        document.getElementById('testimonialModal').classList.remove('show');
    }
</script>

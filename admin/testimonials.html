<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials - Emerald Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--accent-gold-hover);
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 0 24px;
            margin-bottom: 48px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            animation: floatIdle 6s ease-in-out infinite;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            margin: 0 12px;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(201, 168, 76, 0.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gold);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
        }

        .logout-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background: var(--accent-gold);
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab.active {
            color: var(--text-main);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gold);
        }

        .testimonials-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .testimonial-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            box-shadow: 0 8px 24px rgba(13, 43, 31, 0.1);
        }

        .testimonial-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .testimonial-author {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .testimonial-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-card);
            font-weight: 700;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .author-role {
            font-size: 12px;
            color: #999;
        }

        .rating {
            display: flex;
            gap: 4px;
        }

        .star {
            color: var(--accent-gold);
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-pending {
            background: rgba(233, 168, 37, 0.1);
            color: var(--accent-gold-hover);
        }

        .status-approved {
            background: rgba(45, 106, 79, 0.1);
            color: #2D6A4F;
        }

        .status-hidden {
            background: rgba(181, 51, 42, 0.1);
            color: var(--accent-danger);
        }

        .testimonial-text {
            font-size: 14px;
            color: var(--text-main);
            font-style: italic;
            margin: 12px 0;
            line-height: 1.6;
        }

        .testimonial-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .testimonial-actions {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #2D6A4F;
            color: var(--bg-primary);
        }

        .btn-approve:hover {
            background: #1a4d35;
        }

        .btn-hide {
            background: var(--accent-danger);
            color: var(--bg-primary);
        }

        .btn-hide:hover {
            background: #8B2620;
        }

        .btn-delete {
            background: #666;
            color: var(--bg-primary);
        }

        .btn-delete:hover {
            background: #444;
        }

        @keyframes floatIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    
        /* ═══════════════════════════════════════════════════════════
           MOBILE RESPONSIVENESS (Injected via Phase 10 Overhaul)
           ═══════════════════════════════════════════════════════════ */
        
        /* Hamburger Menu Icon (Hidden on Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            /* Show Hamburger */
            .mobile-menu-btn {
                display: block;
            }
            
            /* Sidebar becomes a drawer */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2000;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            /* Main content expands to full width */
            .main-content {
                margin-left: 0;
                width: 100vw;
            }
            
            /* Topbar adjustments */
            .topbar {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .page-title {
                font-size: 22px;
            }
            
            .search-bar {
                display: none; /* Hide search on extreme mobile to save space */
            }
            
            /* Stats Grid Stacking */
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            /* Charts & Tables Stacking */
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            /* Modals */
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 20px;
            }
            
            /* Form Rows */
            .form-row, .booking-grid {
                grid-template-columns: 1fr;
            }
            
            /* Tables */
            .table-container {
                overflow-x: auto;
            }
        }

    
        /* ═══════════════════════════════════════════════════════════
           MOBILE QUICK ACTION FAB
           ═══════════════════════════════════════════════════════════ */
        .mobile-fab-container {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
        }

        .mobile-fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--primary);
            border: none;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.4);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .mobile-fab-btn:active {
            transform: scale(0.92);
        }

        .mobile-fab-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 10px 0;
            min-width: 180px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .mobile-fab-container.active .mobile-fab-menu {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .mobile-fab-container.active .mobile-fab-btn {
            transform: rotate(45deg);
        }

        .fab-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            background: transparent;
            text-align: left;
        }

        .fab-item i {
            margin-right: 12px;
            color: var(--accent);
            width: 16px;
        }

        .fab-item:hover, .fab-item:active {
            background: rgba(201, 168, 76, 0.1);
        }

        @media (max-width: 768px) {
            .mobile-fab-container {
                display: block;
            }
        }

    </style>

    <!-- MOBILE & DARK LOGIC -->
    <script>
        
        (function() {
            if (localStorage.getItem('emeraldDarkMode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        :root {
            --bg-primary: #F7F4EF;
            --bg-card: #FFFFFF;
            --text-main: #0D2B1F;
            --border-color: #E9E5DB;
            --accent-gold: #C9A84C;
            --accent-gold-hover: #E9A825;
            --accent-danger: #B5332A;
            --sidebar-bg: #FFFFFF;
        }

        html.dark-mode {
            --bg-primary: #0a1f16;
            --bg-card: #0d2b1f;
            --text-main: #F7F4EF;
            --border-color: #1a3d2e;
            --sidebar-bg: #091a13;
        }

        /* Generic Dark Mode Fixes */
        html.dark-mode .sidebar { background: var(--sidebar-bg); border-right-color: var(--border-color); }
        html.dark-mode .topbar { background: var(--sidebar-bg); border-bottom-color: var(--border-color); }
        html.dark-mode .modal-content { background: var(--bg-card); }
        html.dark-mode input, html.dark-mode select, html.dark-mode textarea { background: var(--sidebar-bg); color: var(--text-main); }
        html.dark-mode .btn-secondary, html.dark-mode .btn-cancel { color: var(--text-main); }
        html.dark-mode .nav-item { color: var(--text-main); }
        html.dark-mode .pagination-btn { background: var(--sidebar-bg); color: var(--text-main); }
    </style>

    <link rel="stylesheet" href="/admin/assets/premium-admin.css">
</head>
<body>

    <!-- Mobile Quick Action FAB -->
    <div class="mobile-fab-container" id="mobileFab">
        <button class="mobile-fab-btn" onclick="toggleFab()">
            <i class="fas fa-plus"></i>
        </button>
        <div class="mobile-fab-menu">
            <a href="/admin/bookings" class="fab-item">
                <i class="fas fa-calendar-plus"></i> New Booking
            </a>
            <a href="/admin/clients" class="fab-item">
                <i class="fas fa-user-plus"></i> New Client
            </a>
        </div>
    </div>
    
    <script>
        function toggleFab() {
            document.getElementById('mobileFab').classList.toggle('active');
        }
        
        // Close FAB if clicking outside
        document.addEventListener('click', (e) => {
            const fab = document.getElementById('mobileFab');
            if (fab && fab.classList.contains('active') && !fab.contains(e.target)) {
                fab.classList.remove('active');
            }
        });
    </script>

    <div class="admin-layout">
        <div id="sidebarOverlay"></div>
    <aside class="sidebar">
            <div class="sidebar-logo">EMERALD</div>
            <nav>
                <a href="/admin/dashboard" class="nav-item">Dashboard</a>
                <a href="/admin/bookings" class="nav-item">Bookings</a>
                <a href="/admin/clients" class="nav-item">Clients</a>
                <a href="/admin/calendar" class="nav-item">Calendar</a>
                <a href="/admin/analytics" class="nav-item">Analytics</a>
                <a href="/admin/notifications" class="nav-item">Notifications</a>
                <a href="/admin/gallery" class="nav-item">Gallery</a>
                <a href="/admin/testimonials" class="nav-item active">Testimonials</a>
                <a href="/admin/staff" class="nav-item">Staff</a>
                <a href="/admin/settings" class="nav-item">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="topbar" id="adminTopbar">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open navigation menu" onclick="window.toggleSidebar(event)">
        <i class="fas fa-bars"></i>
    </button>
    <h1 class="page-title">Testimonials</h1>
                <div style="flex: 1; text-align: right;">
                    <span style="font-style: italic; color: var(--accent-gold); font-weight: 600;" id="todayDate"></span>
                </div>
            </div>

            <div class="content">
                <div class="tabs">
                    <button class="tab active" onclick="filterTestimonials('all')">All</button>
                    <button class="tab" onclick="filterTestimonials('pending')">Pending Review</button>
                    <button class="tab" onclick="filterTestimonials('approved')">Approved</button>
                    <button class="tab" onclick="filterTestimonials('hidden')">Hidden</button>
                </div>

                <div class="testimonials-list" id="testimonialsList">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const testimonials = [
            { id: 1, name: 'Sarah Johnson', role: 'Bride - Wedding 2023', rating: 5, text: 'Emerald Pearland Events made our wedding absolutely perfect. Every detail was flawlessly executed. Highly recommended!', status: 'approved', eventType: 'wedding' },
            { id: 2, name: 'Michael Chen', role: 'Corporate Director', rating: 5, text: 'Professional team, impeccable coordination. Our gala was a tremendous success thanks to their expertise.', status: 'approved', eventType: 'corporate' },
            { id: 3, name: 'Emma Davis', role: 'Birthday Host', rating: 4, text: 'Great service and wonderful attention to detail. Really made the celebration special!', status: 'pending', eventType: 'birthday' },
            { id: 4, name: 'James Wilson', role: 'Groom - Wedding 2024', rating: 5, text: 'Outstanding coordination and beautiful execution. Everything exceeded our expectations.', status: 'approved', eventType: 'wedding' },
            { id: 5, name: 'Lisa Anderson', role: 'Event Planner', rating: 3, text: 'Good service overall. Some minor timing issues but handled professionally.', status: 'hidden', eventType: 'corporate' },
        ];

        let currentFilter = 'all';

        window.addEventListener('load', () => {
            updateDate();
            renderTestimonials();
        });

        function updateDate() {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('todayDate').textContent = today;
        }

        function renderTestimonials() {
            let filtered = testimonials;
            
            if (currentFilter !== 'all') {
                filtered = testimonials.filter(t => t.status === currentFilter);
            }

            const list = document.getElementById('testimonialsList');
            list.innerHTML = filtered.map(testimonial => {
                const initials = testimonial.name.split(' ').map(n => n[0]).join('');
                const stars = Array(testimonial.rating).fill('★').join('');
                return `
                    <div class="testimonial-card">
                        <div class="testimonial-header">
                            <div class="testimonial-author">
                                <div class="testimonial-avatar">${initials}</div>
                                <div class="author-info">
                                    <div class="author-name">${testimonial.name}</div>
                                    <div class="author-role">${testimonial.role}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <div class="rating">${stars}</div>
                                <span class="status-badge status-${testimonial.status}">${testimonial.status}</span>
                            </div>
                        </div>
                        <div class="testimonial-text">"${testimonial.text}"</div>
                        <div class="testimonial-meta">Event Type: ${testimonial.eventType}</div>
                        <div class="testimonial-actions">
                            ${testimonial.status !== 'approved' ? `<button class="action-btn btn-approve" onclick="approveTestimonial(${testimonial.id})">✓ Approve</button>` : ''}
                            ${testimonial.status !== 'hidden' ? `<button class="action-btn btn-hide" onclick="hideTestimonial(${testimonial.id})">Hide</button>` : ''}
                            <button class="action-btn btn-delete" onclick="deleteTestimonial(${testimonial.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterTestimonials(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderTestimonials();
        }

        function approveTestimonial(id) {
            const testimonial = testimonials.find(t => t.id === id);
            if (testimonial) {
                testimonial.status = 'approved';
                renderTestimonials();
            }
        }

        function hideTestimonial(id) {
            const testimonial = testimonials.find(t => t.id === id);
            if (testimonial) {
                testimonial.status = 'hidden';
                renderTestimonials();
            }
        }

        function deleteTestimonial(id) {
            if (confirm('Delete this testimonial?')) {
                const index = testimonials.findIndex(t => t.id === id);
                if (index > -1) {
                    testimonials.splice(index, 1);
                    renderTestimonials();
                }
            }
        }

        function handleLogout() {
            fetch('/api/admin/logout', { method: 'POST' })
                .then(() => window.location.href = '/admin/login')
                .catch(error => console.error('Logout error:', error));
        }
    </script>
        <script src="/admin/assets/mobile-sidebar.js"></script>
</body>
</html>
